<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0e17;
    --card: #131a2a;
    --card-hover: #1a2340;
    --border: #1e2a45;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --green: #10b981;
    --green-bg: rgba(16, 185, 129, 0.1);
    --red: #ef4444;
    --red-bg: rgba(239, 68, 68, 0.1);
    --blue: #3b82f6;
    --yellow: #f59e0b;
    --orange: #f97316;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(19, 26, 42, 0.8);
    backdrop-filter: blur(10px);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 28px; }
  .header-left h1 { font-size: 18px; font-weight: 700; }
  .subtitle { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .auto-badge {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--card);
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .refresh-btn {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--blue); }
  .refresh-btn.loading .spin { animation: spin 0.8s linear infinite; }
  .status-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.2s;
  }
  .kpi-card:hover { border-color: var(--blue); }
  .kpi-label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .kpi-value {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .kpi-value.green { color: var(--green); }
  .kpi-value.red { color: var(--red); }
  .kpi-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  .charts-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .chart-card h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .chart-container {
    position: relative;
    height: 280px;
  }

  .table-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .table-card h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .table-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }
  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-dim);
    transition: all 0.2s;
  }
  .tab:hover { color: var(--text); background: var(--card-hover); }
  .tab.active { color: var(--text); background: var(--card-hover); border-color: var(--border); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    padding: 10px 12px;
    color: var(--text-dim);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 12px; border-bottom: 1px solid var(--border); }
  tr:hover { background: var(--card-hover); }
  tr:last-child td { border-bottom: none; }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .status-badge.won { background: var(--green-bg); color: var(--green); }
  .status-badge.sold { background: rgba(59,130,246,0.1); color: var(--blue); }
  .status-badge.holding { background: rgba(249,115,22,0.1); color: var(--orange); }

  .pnl-positive { color: var(--green); }
  .pnl-negative { color: var(--red); }

  .wallet-addr {
    font-family: 'SF Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10, 14, 23, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    font-size: 16px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 12px;
  }

  @media (max-width: 900px) {
    .charts-grid { grid-template-columns: 1fr; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <span>Loading...</span>
</div>

<div class="header">
  <div class="header-left">
    <div class="logo">&#127936;</div>
    <div>
      <h1>Polymarket Dashboard</h1>
      <div class="subtitle">
        <span class="wallet-addr">0x938f...da768</span>
        <span id="updateTime" style="margin-left:12px"></span>
      </div>
    </div>
  </div>
  <div class="header-right">
    <span class="auto-badge">Auto-refresh 2min</span>
    <button class="refresh-btn" id="refreshBtn" onclick="refresh(true)">
      <span class="spin">&#128260;</span> Refresh
    </button>
    <div class="status-dot" title="Connected"></div>
  </div>
</div>

<div class="container">
  <div class="kpi-grid" id="kpiGrid"></div>
  <div class="charts-grid">
    <div class="chart-card">
      <h3>&#128200; Daily Cash Flow</h3>
      <div class="chart-container">
        <canvas id="dailyChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h3>&#128202; Market Status</h3>
      <div class="chart-container">
        <canvas id="pieChart"></canvas>
      </div>
    </div>
  </div>
  <div class="charts-grid" style="grid-template-columns: 1fr;">
    <div class="chart-card">
      <h3>&#128176; Per-Market P&amp;L</h3>
      <div class="chart-container">
        <canvas id="pnlChart"></canvas>
      </div>
    </div>
  </div>
  <div class="table-card">
    <h3>&#128203; Market Details</h3>
    <div class="table-tabs">
      <div class="tab active" data-filter="all" onclick="filterTable('all', this)">All</div>
      <div class="tab" data-filter="WON" onclick="filterTable('WON', this)">&#127942; Won</div>
      <div class="tab" data-filter="SOLD" onclick="filterTable('SOLD', this)">&#128204; Sold</div>
      <div class="tab" data-filter="HOLDING" onclick="filterTable('HOLDING', this)">&#9203; Holding</div>
    </div>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>Market</th>
            <th>Side</th>
            <th>Status</th>
            <th>Buy Time</th>
            <th>Buy Prob</th>
            <th>Odds</th>
            <th>Cost</th>
            <th>Return</th>
            <th>P&amp;L</th>
            <th>ROI</th>
            <th>Hold</th>
          </tr>
        </thead>
        <tbody id="marketTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let data = null;
let dailyChart, pieChart, pnlChart;
let currentFilter = 'all';
let refreshInterval;

async function refresh(manual = false) {
  const btn = document.getElementById('refreshBtn');
  if (manual) btn.classList.add('loading');

  try {
    const resp = await fetch('/api/data?refresh=' + manual);
    data = await resp.json();
    render(data);
    document.getElementById('updateTime').textContent =
      'Updated ' + new Date(data.lastUpdated).toLocaleTimeString('en-US', { hour12: false });
  } catch (e) {
    console.error('Refresh failed:', e);
  }

  if (manual) btn.classList.remove('loading');
  document.getElementById('loading').style.display = 'none';
}

function render(d) {
  if (!d || d.error) {
    document.getElementById('loading').innerHTML = '<span style="color:#ef4444">Failed to load data. Check server logs.</span>';
    return;
  }
  const s = d.summary;

  const pnlSign = s.tradingPnL >= 0 ? '+' : '';
  const pnlClass = s.tradingPnL >= 0 ? 'green' : 'red';
  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Net P&amp;L</div>
      <div class="kpi-value ${pnlClass}">${pnlSign}$${s.tradingPnL.toFixed(2)}</div>
      <div class="kpi-sub">${pnlSign}${s.tradingPnLPct.toFixed(1)}% ROI</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Settled Markets</div>
      <div class="kpi-value">${s.wonCount + s.soldCount} <span style="font-size:16px;color:var(--text-dim)">/ ${s.totalMarkets}</span></div>
      <div class="kpi-sub">&#127942; ${s.wonCount} Won &nbsp; &#128204; ${s.soldCount} Sold &nbsp; &#9203; ${s.holdCount} Open</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Win Rate</div>
      <div class="kpi-value">${s.winRate.toFixed(0)}%</div>
      <div class="kpi-sub">${s.wonCount} / ${s.wonCount + s.soldCount} settled</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Total In / Out</div>
      <div class="kpi-value" style="font-size:20px">$${s.totalCost.toFixed(0)} <span style="color:var(--text-dim)">~&gt;</span> $${s.totalRevenue.toFixed(0)}</div>
      <div class="kpi-sub">Turnover 100%</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Account Value</div>
      <div class="kpi-value" style="color:var(--blue)">$${s.accountValue ? s.accountValue.toFixed(2) : '-'}</div>
      <div class="kpi-sub">${s.activePositions} active positions</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Avg Buy Prob</div>
      <div class="kpi-value" style="color:var(--yellow)" id="avgProb">-</div>
      <div class="kpi-sub">Lower = higher odds</div>
    </div>
  `;

  const markets = d.markets || [];
  const marketsWithBuy = markets.filter(m => m.avgBuyPrice > 0);
  if (marketsWithBuy.length > 0) {
    const avgProb = marketsWithBuy.reduce((sum, m) => sum + m.impliedProb, 0) / marketsWithBuy.length;
    document.getElementById('avgProb').textContent = avgProb.toFixed(1) + '%';
  }

  renderDailyChart(d.dailyPnL || []);
  renderPieChart(s);
  renderPnlChart(markets);
  renderTable(markets);
}

function renderDailyChart(dailyData) {
  const ctx = document.getElementById('dailyChart').getContext('2d');
  const labels = dailyData.map(d => d.date.slice(5));
  const outData = dailyData.map(d => -d.out);
  const inData = dailyData.map(d => d.in);
  let cumPnL = 0;
  const cumData = dailyData.map(d => { cumPnL += d.net; return cumPnL; });

  if (dailyChart) dailyChart.destroy();
  dailyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Spent',
          data: outData,
          backgroundColor: 'rgba(239, 68, 68, 0.6)',
          borderRadius: 4,
          stack: 'flow',
        },
        {
          label: 'Income',
          data: inData,
          backgroundColor: 'rgba(16, 185, 129, 0.6)',
          borderRadius: 4,
          stack: 'flow',
        },
        {
          label: 'Cumulative P&L',
          data: cumData,
          type: 'line',
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59, 130, 246, 0.1)',
          fill: true,
          tension: 0.3,
          pointRadius: 4,
          pointBackgroundColor: '#3b82f6',
          yAxisID: 'y',
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { color: '#64748b', usePointStyle: true, pointStyle: 'circle', padding: 16 } },
      },
      scales: {
        x: { stacked: true, grid: { color: 'rgba(30, 42, 69, 0.5)' }, ticks: { color: '#64748b' } },
        y: { stacked: true, grid: { color: 'rgba(30, 42, 69, 0.5)' }, ticks: { color: '#64748b', callback: v => '$' + v } },
      }
    }
  });
}

function renderPieChart(s) {
  const ctx = document.getElementById('pieChart').getContext('2d');
  if (pieChart) pieChart.destroy();
  pieChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Won', 'Sold', 'Holding'],
      datasets: [{
        data: [s.wonCount, s.soldCount, s.holdCount],
        backgroundColor: ['#10b981', '#3b82f6', '#f97316'],
        borderWidth: 0,
        hoverOffset: 8,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '65%',
      plugins: {
        legend: { position: 'bottom', labels: { color: '#64748b', usePointStyle: true, pointStyle: 'circle', padding: 16 } }
      }
    }
  });
}

function renderPnlChart(markets) {
  const ctx = document.getElementById('pnlChart').getContext('2d');
  const resolved = markets.filter(m => m.pnl !== null);
  if (pnlChart) pnlChart.destroy();

  pnlChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: resolved.map(m => m.title.length > 20 ? m.title.substring(0, 20) + '...' : m.title),
      datasets: [{
        label: 'P&L ($)',
        data: resolved.map(m => m.pnl),
        backgroundColor: resolved.map(m => m.pnl >= 0 ? 'rgba(16, 185, 129, 0.7)' : 'rgba(239, 68, 68, 0.7)'),
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const m = resolved[ctx.dataIndex];
              return (m.pnl >= 0 ? '+' : '') + '$' + m.pnl.toFixed(2) + ' (' + (m.pnlPct >= 0 ? '+' : '') + m.pnlPct.toFixed(1) + '%) ' + m.outcome;
            }
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#64748b', maxRotation: 45, font: { size: 10 } } },
        y: { grid: { color: 'rgba(30, 42, 69, 0.5)' }, ticks: { color: '#64748b', callback: v => (v >= 0 ? '+' : '') + '$' + v } },
      }
    }
  });
}

function renderTable(markets) {
  const tbody = document.getElementById('marketTable');
  const filtered = currentFilter === 'all' ? markets : markets.filter(m => m.status === currentFilter);

  tbody.innerHTML = filtered.map(m => {
    const statusClass = m.status.toLowerCase();
    const statusIcon = m.status === 'WON' ? '&#127942;' : m.status === 'SOLD' ? '&#128204;' : '&#9203;';
    const statusText = m.status === 'WON' ? 'Won' : m.status === 'SOLD' ? 'Sold' : 'Open';
    const pnlClass = m.pnl !== null ? (m.pnl >= 0 ? 'pnl-positive' : 'pnl-negative') : '';
    const pnlStr = m.pnl !== null ? (m.pnl >= 0 ? '+' : '') + '$' + m.pnl.toFixed(2) : 'Pending';
    const pctStr = m.pnlPct !== null ? (m.pnlPct >= 0 ? '+' : '') + m.pnlPct.toFixed(1) + '%' : '-';
    const probColor = m.impliedProb >= 90 ? 'var(--text-dim)' : m.impliedProb >= 80 ? 'var(--blue)' : m.impliedProb >= 70 ? 'var(--yellow)' : 'var(--orange)';
    const buyTime = m.startTime ? new Date(m.startTime).toLocaleString('en-US', { timeZone: 'Asia/Shanghai', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }) : '-';
    const oddsStr = m.impliedOdds !== null ? m.impliedOdds.toFixed(2) : '-';

    return '<tr>' +
      '<td>' + m.title + '</td>' +
      '<td>' + m.outcome + '</td>' +
      '<td><span class="status-badge ' + statusClass + '">' + statusIcon + ' ' + statusText + '</span></td>' +
      '<td style="color:var(--text-dim);font-size:12px;white-space:nowrap">' + buyTime + '</td>' +
      '<td style="color:' + probColor + ';font-weight:600">' + m.impliedProb + '%</td>' +
      '<td style="color:var(--text-dim)">' + oddsStr + '</td>' +
      '<td>$' + m.cost.toFixed(2) + '</td>' +
      '<td>$' + (m.sellRevenue + m.redeemRevenue).toFixed(2) + '</td>' +
      '<td class="' + pnlClass + '" style="font-weight:600">' + pnlStr + '</td>' +
      '<td class="' + pnlClass + '">' + pctStr + '</td>' +
      '<td style="color:var(--text-dim)">' + m.holdHours + 'h</td>' +
      '</tr>';
  }).join('');
}

function filterTable(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  if (data) renderTable(data.markets || []);
}

refreshInterval = setInterval(function() { refresh(false); }, 120000);
refresh(false);
</script>
</body>
</html>
